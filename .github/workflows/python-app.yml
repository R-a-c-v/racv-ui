name: RACV UI - CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  APP_NAME: "racv-ui"
  APP_ROOT: "/opt/racv-ui"
  VM_USERNAME: redeautocvuser
  VM_IP: 74.235.237.161

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Package dist
        run: |
          tar -czf dist.tar.gz dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/deploy_key.pem
          ${{ secrets.SSH_KEY_001 }}
          EOF
          chmod 600 ~/deploy_key.pem

      - name: Upload release bundle
        run: |
          scp -o StrictHostKeyChecking=no -i ~/deploy_key.pem \
            "${{ env.RELEASE_NAME }}.tar.gz" \
            ${{ vars.VM_USERNAME }}@${{ vars.VM_IP }}:~/
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 🔴 ISTO É O QUE FALTAVA
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_KEY_001 }}" > ~/deploy_key.pem
          chmod 400 ~/deploy_key.pem
      - name: Deploy on server (atomic swap)
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            ${{ env.VM_USERNAME }}@${{ env.VM_IP }} << 'EOF'
          set -euo pipefail

          APP_ROOT="/opt/racv-ui"
          RELEASE="$(date +%Y%m%d%H%M%S)"
          RELEASES_DIR="$APP_ROOT/releases"
          CURRENT_LINK="$APP_ROOT/current"

          mkdir -p "$RELEASES_DIR"
          cd "$RELEASES_DIR"

          mkdir "$RELEASE"
          tar -xzf ~/dist.tar.gz -C "$RELEASE"
          rm -f ~/dist.tar.gz

          ln -sfn "$RELEASES_DIR/$RELEASE/dist" "$CURRENT_LINK"

          sudo systemctl reload nginx || true

          # keep last 5 releases
          ls -1dt "$RELEASES_DIR"/* | tail -n +6 | xargs -r rm -rf

          echo "UI deploy OK -> $RELEASE"
          EOF
