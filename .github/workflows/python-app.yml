name: RACV UI - CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  APP_NAME: "racv-ui"
  APP_ROOT: "/opt/racv-ui"
  VM_USERNAME: redeautocvuser
  VM_IP: 74.235.237.161

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Package dist
        run: |
          tar -czf dist.tar.gz dist
          
      - name: Debug SSH key
        run: |
          echo "${{ secrets.SSH_KEY_001 }}" | head -n 2
          echo "..."
          echo "${{ secrets.SSH_KEY_001 }}" | tail -n 2

      - name: Debug SSH key length
        run: |
          echo "${{ secrets.SSH_KEY_001 }}" | wc -c
      
      - name: Debug CR characters
        run: |
          echo "${{ secrets.SSH_KEY_001 }}" | grep -P '\r' || echo "No CR found"

 
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Remove CRLF se a chave veio do Windows
          echo "${{ secrets.SSH_KEY_001 }}" | tr -d '\r' > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Upload release bundle
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem \
            dist.tar.gz \
            ${{ env.VM_USERNAME }}@${{ env.VM_IP }}:~/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_001 }}" | tr -d '\r' > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Deploy on server (atomic swap)
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            ${{ env.VM_USERNAME }}@${{ env.VM_IP }} << 'EOF'
          set -euo pipefail

          APP_ROOT="/opt/racv-ui"
          RELEASE="$(date +%Y%m%d%H%M%S)"
          RELEASES_DIR="$APP_ROOT/releases"
          CURRENT_LINK="$APP_ROOT/current"

          mkdir -p "$RELEASES_DIR"
          cd "$RELEASES_DIR"

          mkdir "$RELEASE"
          tar -xzf ~/dist.tar.gz -C "$RELEASE"
          rm -f ~/dist.tar.gz

          ln -sfn "$RELEASES_DIR/$RELEASE/dist" "$CURRENT_LINK"

          sudo systemctl reload nginx || true

          # Keep last 5 releases
          ls -1dt "$RELEASES_DIR"/* | tail -n +6 | xargs -r rm -rf

          echo "UI deploy OK -> $RELEASE"
          EOF
